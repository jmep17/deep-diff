<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Deep Dish Diff Logo Review</title>
    <style>
      :root {
        color: #221d18;
        background: #fbf4e8;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        display: grid;
        gap: 28px;
        max-width: 1120px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 1px solid #e3d5bd;
        padding-bottom: 20px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.05;
      }

      p {
        color: #786f64;
        font-size: 14px;
        line-height: 1.5;
      }

      .panel {
        display: grid;
        gap: 16px;
        border: 1px solid #e3d5bd;
        border-radius: 8px;
        padding: 20px;
        background: #fffdfa;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .tile {
        display: grid;
        min-height: 180px;
        place-items: center;
        border: 1px solid #e3d5bd;
        border-radius: 8px;
        background: #fbf4e8;
      }

      .tile.dark {
        border-color: #242a2f;
        background: #111417;
      }

      .sizes {
        display: flex;
        align-items: center;
        gap: 18px;
        min-height: 88px;
      }

      .sizes img {
        display: block;
      }

      .sheet {
        width: 100%;
        height: auto;
        border: 1px solid #e3d5bd;
        border-radius: 8px;
        background: #fbf4e8;
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        header,
        .preview-grid {
          grid-template-columns: 1fr;
        }

        header {
          display: grid;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Deep Dish Diff logo review</h1>
          <p>
            Production SVG assets for the app mark, favicon, mono mark, and horizontal wordmark.
          </p>
        </div>
        <img
          src="logo-horizontal.svg"
          width="320"
          height="80"
          alt="Deep Dish Diff horizontal logo"
        />
      </header>

      <section class="panel">
        <h2>Primary mark</h2>
        <div class="preview-grid">
          <div class="tile">
            <img
              src="mark-primary.svg"
              width="128"
              height="128"
              alt="Primary mark on light background"
            />
          </div>
          <div class="tile dark">
            <img
              src="mark-primary.svg"
              width="128"
              height="128"
              alt="Primary mark on dark background"
            />
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Small sizes</h2>
        <div class="sizes" aria-label="Primary mark rendered at 16, 24, 32, and 64 pixels">
          <img src="mark-primary.svg" width="16" height="16" alt="" />
          <img src="mark-primary.svg" width="24" height="24" alt="" />
          <img src="mark-primary.svg" width="32" height="32" alt="" />
          <img src="mark-primary.svg" width="64" height="64" alt="" />
        </div>
      </section>

      <section class="panel">
        <h2>Monochrome</h2>
        <div class="sizes">
          <img src="mark-mono.svg" width="64" height="64" alt="Monochrome mark" />
          <img src="mark-mono.svg" width="128" height="128" alt="" />
        </div>
      </section>

      <section class="panel">
        <h2>Concept directions</h2>
        <img
          class="sheet"
          src="logo-directions.svg"
          alt="Three Deep Dish Diff logo concept directions"
        />
      </section>
    </main>
  </body>
</html>
